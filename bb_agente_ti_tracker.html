    --surface: #161a24;
    --surface2: #1e2435;
    --border: #2a3048;

    --text-muted: #6b7490;
    --accent: #4f8ef7;
    --red: #ef4444;
    --orange: #f59e0b;
    --green: #22c55e;
    --purple: #a78bfa;
    --cyan: #06b6d4;
    --pink: #ec4899;
    
    --status-0: #374151; /* não iniciado */
    --status-1: #92400e; /* em andamento */
    --status-2: #065f46; /* estudado */
    --status-3: #7f1d1d; /* revisar */
    --status-4: #4c1d95; /* revisado */
    
    --status-0-t: #9ca3af;
    --status-1-t: #fbbf24;
    --status-2-t: #34d399;
    --status-3-t: #f87171;
    --status-4-t: #c4b5fd;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  .app-shell {
    width: 100%;
    max-width: 1120px;
    margin: 0 auto;
  }

  header {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    background: rgba(79,142,247,0.12);
    border: 1px solid rgba(79,142,247,0.3);
    padding: 4px 10px;
    border-radius: 4px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  h1 span { color: var(--accent); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  .progress-bar-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--cyan));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .tab .badge {
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
  }

  .disc-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .disc-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .disc-title { font-weight: 600; font-size: 15px; }
  .disc-meta {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .disc-progress {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    max-width: 120px;
  }

  .disc-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  .topics-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
  }

  .table-wrap {
    width: 100%;
    overflow-x: auto;
    border-radius: 10px;
  }

  .topics-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .topics-table tr:nth-child(even) td { background: rgba(255,255,255,0.015); }

  .topics-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(42,48,72,0.5);
    font-size: 13px;
    vertical-align: middle;
  }

  .topic-name { color: var(--text); line-height: 1.4; }

  .status-select {
    appearance: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    width: 130px;
    outline: none;
    transition: border-color 0.15s;
  }

  .status-select:focus { border-color: var(--accent); }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }

  .note-input {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    padding: 3px 6px;
    border-radius: 4px;
    width: 100%;
    outline: none;
    transition: all 0.15s;
  }

  .note-input:focus {
    border-color: var(--border);
    background: var(--surface2);
    color: var(--text);
  }

  .note-input::placeholder { color: var(--border); }

  .priority-tag {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .save-indicator {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 8px 0;
  }

  .save-indicator.saved { color: var(--green); }
  .save-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .filter-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .filter-label { font-size: 11px; color: var(--text-muted); }

  .filter-btn {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--accent);
  }

  .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }

  .auth-form {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-left: auto;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .auth-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    min-width: 180px;
    font-size: 13px;
    outline: none;
  }

  .auth-input:focus {
    border-color: var(--accent);
  }

  @media (max-width: 900px) {
    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .disc-header {
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .disc-meta {
      margin-left: 0;
      width: 100%;
    }

    .disc-progress {
      max-width: none;
      width: 100%;
      order: 4;
    }

    .topics-table {
      min-width: 720px;
    }
  }

  @media (max-width: 640px) {
    body {
      padding: 12px;
    }

    h1 {
      font-size: 20px;
    }

    .stats-grid {
      grid-template-columns: 1fr;
    }

    .tab {
      width: 100%;
      justify-content: space-between;
    }

    .auth-form {
      width: 100%;
      margin-left: 0;
      justify-content: stretch;
    }

    .auth-input,
    .auth-form .filter-btn {
      width: 100%;
    }

    .filter-row {
      gap: 6px;
    }
  }
</style>

let authReady = false;
let remoteEnabled = false;

const storageAdapter = {
  async get(keyName) {
    if (remoteEnabled && currentUser) {
      const snapshot = await getDoc(doc(db, "studyProgress", currentUser.uid));
      if (snapshot.exists()) {
        const data = snapshot.data();
        return { value: JSON.stringify(data.state || {}) };
      }
    }

    try {
      const value = window.localStorage.getItem(keyName);
      return { value };
    } catch (error) {
      return { value: null };
    }
  },
  async set(keyName, value) {
    if (remoteEnabled && currentUser) {
      await setDoc(doc(db, "studyProgress", currentUser.uid), {
        state: JSON.parse(value),
        updatedAt: new Date().toISOString(),
        email: currentUser.email || null
      }, { merge: true });
    }

    window.localStorage.setItem(keyName, value);
    return true;
  }
};

function updateSaveIndicator(message, isSaved = false) {
  const ind = document.getElementById("save-ind");
  if (!ind) return;
  ind.className = isSaved ? "save-indicator saved" : "save-indicator";
  ind.querySelector("span").textContent = message;
}

function describeAuthError(error) {
  if (!error || !error.code) return "erro-desconhecido";
  if (error.code === "auth/operation-not-allowed") return "email-senha-nao-habilitado";
  if (error.code === "auth/invalid-credential") return "email-ou-senha-invalidos";
  if (error.code === "auth/invalid-email") return "email-invalido";
  if (error.code === "auth/missing-password") return "senha-obrigatoria";
  if (error.code === "auth/weak-password") return "senha-fraca";
  if (error.code === "auth/email-already-in-use") return "email-ja-cadastrado";
  if (error.code === "permission-denied") return "firestore-sem-permissao";
  return error.code;
}

function renderAuthBar() {
  let authBar = document.getElementById("auth-bar");
  if (!authBar) {
    authBar = document.createElement("div");
    authBar.id = "auth-bar";
    authBar.className = "disc-header";
    document.body.insertBefore(authBar, document.getElementById("stats-grid"));
  }

  if (!authReady) {
    authBar.innerHTML = '<div class="disc-title">Conectando ao Firebase...</div>';
    return;
  }

  if (currentUser) {
    authBar.innerHTML = `
      <div class="disc-title">Sincronização ativa</div>
      <div class="disc-meta">${currentUser.email || "Usuário autenticado"}</div>
      <button class="filter-btn active" id="logout-btn">Sair</button>
    `;
    document.getElementById("logout-btn").onclick = async () => {
      await signOut(auth);
    };
    return;
  }

  authBar.innerHTML = `
    <div>
      <div class="disc-title">Login pessoal</div>
      <div class="disc-meta">Use email e senha para salvar na nuvem</div>
    </div>
    <div class="auth-form">
      <input class="auth-input" id="email-input" type="email" placeholder="Seu email" />
      <input class="auth-input" id="password-input" type="password" placeholder="Sua senha" />
      <button class="filter-btn active" id="login-btn">Entrar</button>
      <button class="filter-btn" id="register-btn">Criar acesso</button>
    </div>
  `;

  const getCredentials = () => ({
    email: document.getElementById("email-input").value.trim(),
    password: document.getElementById("password-input").value
  });

  document.getElementById("login-btn").onclick = async () => {
    try {
      const { email, password } = getCredentials();
      await signInWithEmailAndPassword(auth, email, password);
      updateSaveIndicator("Login realizado com sucesso", true);
    } catch (error) {
      updateSaveIndicator(`Falha no login: ${describeAuthError(error)}`);
    }
  };

  document.getElementById("register-btn").onclick = async () => {
    try {
      const { email, password } = getCredentials();
      await createUserWithEmailAndPassword(auth, email, password);
      updateSaveIndicator("Acesso criado com sucesso", true);
    } catch (error) {
      updateSaveIndicator(`Falha ao criar acesso: ${describeAuthError(error)}`);
    }
  };
}

function key(discId, topicIdx) { return `${discId}:${topicIdx}`; }

function getState(discId, idx) {
  return state[key(discId, idx)] || { status: "0", note: "" };
}

function setState(discId, idx, field, val) {
  const k = key(discId, idx);
  if (!state[k]) state[k] = { status: "0", note: "" };
  state[k][field] = val;
  scheduleSave();
  renderStats();
  renderDiscHeader(discId);
}

async function loadState() {
  try {
    const r = await storageAdapter.get(STORAGE_KEY);
    if (r && r.value) state = JSON.parse(r.value);
  } catch(e) {
    state = {};
    updateSaveIndicator(`Falha ao carregar dados: ${describeAuthError(e)}`);
  }
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  updateSaveIndicator(remoteEnabled && currentUser ? "Sincronizando..." : "Salvando localmente...");
  saveTimeout = setTimeout(async () => {
    try {
      await storageAdapter.set(STORAGE_KEY, JSON.stringify(state));
      updateSaveIndicator(remoteEnabled && currentUser ? "Dados sincronizados ✓" : "Dados salvos localmente ✓", true);
    } catch(e) {
      updateSaveIndicator("Erro ao salvar");
    }
  }, 800);
}

function countByStatus(discId) {
  const disc = DISCIPLINES.find(d => d.id === discId);
  const counts = { "0":0, "1":0, "2":0, "3":0, "4":0 };
  disc.topics.forEach((_, i) => {
    const s = getState(discId, i).status;
    counts[s] = (counts[s] || 0) + 1;
  });
  return counts;
}

function renderStats() {
  const totalTopics = DISCIPLINES.reduce((s, d) => s + d.topics.length, 0);
  let studied = 0, reviewing = 0, inProgress = 0, revised = 0;
  DISCIPLINES.forEach(d => {
    d.topics.forEach((_, i) => {
      const s = getState(d.id, i).status;
      if (s === "2") studied++;
      if (s === "3") reviewing++;
      if (s === "1") inProgress++;
      if (s === "4") revised++;
    });
  });
  const done = studied + revised;
  const pct = Math.round((done / totalTopics) * 100);

  document.getElementById("stats-grid").innerHTML = `
    <div class="stat-card">
      <div class="stat-num" style="color:var(--accent)">${totalTopics}</div>
      <div class="stat-label">Total de tópicos</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--status-1-t)">${inProgress}</div>
      <div class="stat-label">Em andamento</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--status-2-t)">${studied}</div>
      <div class="stat-label">Estudados</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--status-3-t)">${reviewing}</div>
      <div class="stat-label">Para revisar</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--status-4-t)">${revised}</div>
      <div class="stat-label">Revisados</div>
    </div>
  `;
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";
}

function renderDiscHeader(discId) {
  const el = document.getElementById("disc-header-" + discId);
  if (!el) return;
  const disc = DISCIPLINES.find(d => d.id === discId);
  const counts = countByStatus(discId);
  const done = (counts["2"] || 0) + (counts["4"] || 0);
  const pct = Math.round((done / disc.topics.length) * 100);
  const fillEl = el.querySelector(".disc-progress-fill");
  const metaEl = el.querySelector(".disc-meta");
  if (fillEl) fillEl.style.width = pct + "%";
  if (metaEl) metaEl.textContent = `${done}/${disc.topics.length} tópicos · ${disc.questions}q · ${disc.points}pts`;
}

function renderTabs() {
  const tabLabels = {
    portugues: "Português",
    ingles: "Inglês"
  };

  document.getElementById("tabs").innerHTML = DISCIPLINES.map(d => {
    const counts = countByStatus(d.id);
    const done = (counts["2"] || 0) + (counts["4"] || 0);
    return `<button class="tab ${d.id === activeTab ? 'active' : ''}" onclick="setTab('${d.id}')">
      <span style="width:8px;height:8px;border-radius:50%;background:${d.color};display:inline-block"></span>
      ${tabLabels[d.id] || d.name.split(' ')[0] + (d.name.split(' ').length > 2 ? '...' : '')}
      <span class="badge">${done}/${d.topics.length}</span>
    </button>`;
  }).join("");
}

function setTab(id) {
  activeTab = id;
  renderTabs();
  renderContent();
}

function setStatusFilter(sf, btn) {
  statusFilter = sf;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderContent();
}

function renderContent() {
  const disc = DISCIPLINES.find(d => d.id === activeTab);
  const counts = countByStatus(disc.id);
  const done = (counts["2"] || 0) + (counts["4"] || 0);
  const pct = Math.round((done / disc.topics.length) * 100);

  let filteredTopics = disc.topics.map((t, i) => ({ t, i }));
  if (statusFilter !== "all") {
    filteredTopics = filteredTopics.filter(({ i }) => getState(disc.id, i).status === statusFilter);
  }

  const rows = filteredTopics.map(({ t, i }) => {
    const s = getState(disc.id, i);
    const st = STATUS_CONFIG.find(x => x.key === s.status) || STATUS_CONFIG[0];
    return `<tr>
      <td style="width:40px;color:var(--text-muted);font-family:'Space Mono',monospace;font-size:11px">${String(i+1).padStart(2,'0')}</td>
      <td class="topic-name">${t}</td>
      <td style="width:150px">
        <div class="status-badge" style="background:${st.bg};color:${st.color}">
          <select class="status-select" style="background:transparent;border:none;color:${st.color};width:135px"
            onchange="setState('${disc.id}', ${i}, 'status', this.value); this.closest('tr').cells[2].querySelector('.status-badge').style.background = STATUS_CONFIG.find(x=>x.key===this.value).bg; this.closest('tr').cells[2].querySelector('.status-badge').style.color = STATUS_CONFIG.find(x=>x.key===this.value).color; renderTabs();">
            ${STATUS_CONFIG.map(sc => `<option value="${sc.key}" ${s.status === sc.key ? 'selected' : ''} style="background:#1e2435;color:${sc.color}">${sc.label}</option>`).join("")}
          </select>
        </div>
      </td>
      <td style="width:200px">
        <input class="note-input" type="text" placeholder="Anotação..."
          value="${(s.note || '').replace(/"/g, '&quot;')}"
          onchange="setState('${disc.id}', ${i}, 'note', this.value)"
          onblur="setState('${disc.id}', ${i}, 'note', this.value)" />
      </td>
    </tr>`;
  }).join("");

  document.getElementById("content").innerHTML = `
    <div class="disc-header" id="disc-header-${disc.id}">
      <div class="disc-dot" style="background:${disc.color}"></div>
      <div class="disc-title">${disc.name}</div>
      <div class="disc-progress"><div class="disc-progress-fill" style="background:${disc.color};width:${pct}%"></div></div>
      <span class="priority-tag" style="background:${disc.pBg};color:${disc.pColor}">${disc.priority}</span>
      <div class="disc-meta">${done}/${disc.topics.length} tópicos · ${disc.questions}q · ${disc.points}pts</div>
    </div>
    ${filteredTopics.length === 0 
      ? '<div class="empty">Nenhum tópico com esse status nessa disciplina.</div>'
      : `<div class="table-wrap"><table class="topics-table">
          <thead><tr>
            <th>#</th>
            <th>Tópico</th>
            <th>Status</th>
            <th>Anotações</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`
    }
  `;
}

async function init() {
  renderAuthBar();
  await loadState();
  renderStats();
  renderTabs();
  renderContent();
}

onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  authReady = true;
  remoteEnabled = Boolean(user);
  renderAuthBar();
  await loadState();
  renderStats();
  renderTabs();
  renderContent();
  updateSaveIndicator(remoteEnabled && currentUser ? "Dados sincronizados com Firebase" : "Modo local ativo");
});

init();
</script>
</body>
</html>
