
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161a24;
    --surface2: #1e2435;
    --border: #2a3048;
    --text: #e8eaf0;
    --text-muted: #6b7490;
    --accent: #4f8ef7;
    --red: #ef4444;
    --orange: #f59e0b;
    --green: #22c55e;
    --purple: #a78bfa;
    --cyan: #06b6d4;
    --pink: #ec4899;
    
    --status-0: #374151; /* não iniciado */
    --status-1: #92400e; /* em andamento */
    --status-2: #065f46; /* estudado */
    --status-3: #7f1d1d; /* revisar */
    --status-4: #4c1d95; /* revisado */
    
    --status-0-t: #9ca3af;
    --status-1-t: #fbbf24;
    --status-2-t: #34d399;
    --status-3-t: #f87171;
    --status-4-t: #c4b5fd;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  .app-shell {
    width: 100%;
    max-width: 1120px;
    margin: 0 auto;
  }

  header {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    background: rgba(79,142,247,0.12);
    border: 1px solid rgba(79,142,247,0.3);
    padding: 4px 10px;
    border-radius: 4px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  h1 span { color: var(--accent); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  .progress-bar-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--cyan));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .tab .badge {
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
  }

  .disc-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .disc-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .disc-title { font-weight: 600; font-size: 15px; }
  .disc-meta {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .disc-progress {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    max-width: 120px;
  }

  .disc-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  .topics-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
  }

  .table-wrap {
    width: 100%;
    overflow-x: auto;
    border-radius: 10px;
  }

  .topics-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .topics-table tr:nth-child(even) td { background: rgba(255,255,255,0.015); }

  .topics-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(42,48,72,0.5);
    font-size: 13px;
    vertical-align: middle;
  }

  .topic-name { color: var(--text); line-height: 1.4; }

  .status-select {
    appearance: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    width: 130px;
    outline: none;
    transition: border-color 0.15s;
  }

  .status-select:focus { border-color: var(--accent); }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }

  .note-input {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    padding: 3px 6px;
    border-radius: 4px;
    width: 100%;
    outline: none;
    transition: all 0.15s;
  }

  .note-input:focus {
    border-color: var(--border);
    background: var(--surface2);
    color: var(--text);
  }

  .note-input::placeholder { color: var(--border); }

  .priority-tag {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .save-indicator {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 8px 0;
  }

  .save-indicator.saved { color: var(--green); }
  .save-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .filter-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .filter-label { font-size: 11px; color: var(--text-muted); }

  .filter-btn {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--accent);
  }

  .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }

  .auth-form {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-left: auto;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .auth-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    min-width: 180px;
    font-size: 13px;
    outline: none;
  }

  .auth-input:focus {
    border-color: var(--accent);
  }

  @media (max-width: 900px) {
    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .disc-header {
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .disc-meta {
      margin-left: 0;
      width: 100%;
    }

    .disc-progress {
      max-width: none;
      width: 100%;
      order: 4;
    }

    .topics-table {
      min-width: 720px;
    }
  }

  @media (max-width: 640px) {
    body {
      padding: 12px;
    }

    h1 {
      font-size: 20px;
    }

    .stats-grid {
      grid-template-columns: 1fr;
    }

    .tab {
      width: 100%;
      justify-content: space-between;
    }

    .auth-form {
      width: 100%;
      margin-left: 0;
      justify-content: stretch;
    }

    .auth-input,
    .auth-form .filter-btn {
      width: 100%;
    }

    .filter-row {
      gap: 6px;
    }
  }
</style>
</head>
<body>

<div class="app-shell">

<header>
  <div class="logo-row">
    <div class="logo">BB · Agente de TI</div>
    <div style="font-size:11px;color:var(--text-muted);">Tracker de Estudos · CESGRANRIO</div>
  </div>
  <h1>Controle de <span>Progresso</span></h1>
  <div class="filter-row" style="margin-bottom:0;">
    <a class="filter-btn active" href="/guia.html" style="text-decoration:none;display:inline-flex;align-items:center;">Abrir guia completo</a>
  </div>
</header>

<div class="stats-grid" id="stats-grid"></div>

<div class="progress-bar-container">
  <div class="progress-label">
    <span>Progresso geral</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<div class="tabs" id="tabs"></div>

<div class="filter-row">
  <span class="filter-label">Filtrar por status:</span>
  <button class="filter-btn active" data-sf="all" onclick="setStatusFilter('all',this)">Todos</button>
  <button class="filter-btn" data-sf="0" onclick="setStatusFilter('0',this)">Não iniciados</button>
  <button class="filter-btn" data-sf="3" onclick="setStatusFilter('3',this)">Precisa revisar</button>
  <button class="filter-btn" data-sf="1" onclick="setStatusFilter('1',this)">Em andamento</button>
  <button class="filter-btn" data-sf="2" onclick="setStatusFilter('2',this)">Estudados</button>
</div>

<div id="content"></div>

<div class="save-indicator" id="save-ind">
  <div class="save-dot"></div>
  <span>Dados salvos automaticamente</span>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { browserLocalPersistence, createUserWithEmailAndPassword, getAuth, onAuthStateChanged, setPersistence, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
import { doc, getDoc, getFirestore, setDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5sK2mocTOB04GyrOFM8Ya6OKZjYmL4So",
  authDomain: "study-progress-7000c.firebaseapp.com",
  projectId: "study-progress-7000c",
  storageBucket: "study-progress-7000c.firebasestorage.app",
  messagingSenderId: "220786454851",
  appId: "1:220786454851:web:e2714126605a61deda7ff6",
  measurementId: "G-C45M7KTYCX"
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);

const DISCIPLINES = [
  {
    id: "ti",
    name: "Tecnologia da Informação",
    points: 52.5,
    questions: 35,
    color: "#4f8ef7",
    priority: "🔴 CRÍTICO",
    pColor: "#ef4444",
    pBg: "rgba(239,68,68,0.15)",
    // ATENÇÃO: a ordem dos tópicos foi alterada (reordenação estratégica baseada em provas CESGRANRIO).
    // Dados de status salvos anteriormente com chaves como "ti:0", "ti:1" etc. ficarão dessincronizados
    // com os novos índices — não há mecanismo de migração implementado.
    topics: [
      { name: "Estrutura de Dados: Busca sequencial e binária em arrays", description: "Busca sequencial percorre elemento por elemento O(n). Busca binária divide o array ao meio a cada passo O(log n) — exige array ordenado. Gran: Tópico 9 (aulas de ordenação contêm exercícios de busca) + PDF 'Interpretação de Algoritmos' e 'Algoritmos e Estruturas de Dados' da Patrícia Quintão." },
      { name: "Estrutura de Dados: Ordenação Bubble Sort", description: "Compara pares adjacentes e troca posições repetidamente até ordenar. Complexidade O(n²) no pior caso. CESGRANRIO cobra rastreamento passo a passo do algoritmo. Gran: Tópico 9." },
      { name: "Estrutura de Dados: Ordenação Selection Sort", description: "Encontra o menor elemento restante e o coloca na posição correta a cada iteração. Complexidade O(n²). Gran: Tópico 9." },
      { name: "Estrutura de Dados: Ordenação Insertion Sort", description: "Insere cada elemento na posição correta dentro da parte já ordenada. Complexidade O(n²) pior caso, O(n) melhor caso (array já ordenado). Gran: Tópico 9." },
      { name: "Estrutura de Dados: Lista encadeada", description: "Cada nó contém um valor e um ponteiro para o próximo nó. Permite inserção e remoção eficiente sem realocação de memória. Variações: simples, dupla, circular. Gran: Tópico 11." },
      { name: "Estrutura de Dados: Pilha (LIFO)", description: "Last In, First Out. Operações: push (empilha), pop (desempilha), peek (topo sem remover). CESGRANRIO gosta de simular execução passo a passo com pilhas em Java (cobrado em 2023, Q66). Gran: Tópico 11." },
      { name: "Estrutura de Dados: Fila (FIFO)", description: "First In, First Out. Operações: enqueue (enfileira), dequeue (desenfileira). Aplicações: filas de atendimento, processos em espera. Gran: Tópico 11." },
      { name: "Estrutura de Dados: Árvore binária", description: "Estrutura hierárquica onde cada nó tem no máximo 2 filhos. Percursos: pré-ordem (raiz, esq, dir), in-ordem (esq, raiz, dir), pós-ordem (esq, dir, raiz). CESGRANRIO cobrou percurso pré-ordem em 2023 (Q67). Gran: Tópico 11." },
      { name: "Banco de Dados: Modelo relacional e normalização (1FN, 2FN, 3FN)", description: "Dados em tabelas com chaves primárias e estrangeiras. 1FN: elimina grupos repetidos. 2FN: dependência total da PK. 3FN: elimina dependências transitivas. CESGRANRIO cobra identificar violações de forma normal em tabelas de exemplo. Gran: Tópico 7 + PDF 'Banco de Dados Parte I–V' da Patrícia Quintão." },
      { name: "Banco de Dados: Modelagem Entidade-Relacionamento (ER)", description: "Entidades, atributos e relacionamentos com cardinalidades (0,1), (1,1), (1,n), (n,m). CESGRANRIO cobrou mapeamento de diagrama ER para tabela relacional e definição de PRIMARY KEY correta em 2023 (Q68, Q69). Gran: Tópico 7 + PDF 'Banco de Dados'." },
      { name: "Banco de Dados: SQL 2008 (SELECT, JOIN, GROUP BY, subconsultas)", description: "SELECT, FROM, WHERE, JOIN (INNER, LEFT, RIGHT), GROUP BY, HAVING, subconsultas com NOT IN. CESGRANRIO cobrou 5 questões de SQL em 2023. Atenção ao produto cartesiano sem WHERE (Q56) e NOT IN com subconsulta (Q53). Gran: Tópico 7." },
      { name: "Banco de Dados: SGBD (ACID, transações, índices, views)", description: "Propriedades ACID (Atomicidade, Consistência, Isolamento, Durabilidade), controle de transações, índices para melhorar performance de consultas, views. CESGRANRIO cobrou funções do SGBD (Q57) e índices (Q54) em 2023. Gran: Tópico 7." },
      { name: "Banco de Dados: Data Warehouse (OLAP, star/snowflake schema)", description: "Armazém de dados históricos para análise gerencial. OLAP vs OLTP, modelagem dimensional, star schema (tabela fato + dimensões), snowflake schema (dimensões normalizadas). Gran: Tópico 3 + PDF 'Business Intelligence e Pipeline de Dados' da Patrícia Quintão." },
      { name: "Banco de Dados: NoSQL — conceitos gerais", description: "Bancos não relacionais: ausência de schema rígido, escalabilidade horizontal, propriedades BASE (Basically Available, Soft state, Eventual consistency) em contraposição ao ACID. Gran: Tópico 2 + PDF 'Banco de Dados NoSQL' da Patrícia Quintão." },
      { name: "Banco de Dados: NoSQL — orientado a documentos", description: "Armazena documentos JSON ou BSON. Flexível para dados semiestruturados. Exemplo principal: MongoDB. Gran: Tópico 2." },
      { name: "Banco de Dados: NoSQL — orientado a grafos", description: "Modela nós (entidades) e arestas (relacionamentos) para representar redes complexas. Ideal para redes sociais, sistemas de recomendação, grafos de conhecimento. CESGRANRIO cobrou em 2023 (Q59 — campanha de indicações entre colaboradores). Gran: Tópico 2." },
      { name: "Banco de Dados: NoSQL — chave/valor", description: "Estrutura mais simples: cada registro é um par chave → valor. Alta performance para lookup direto. Exemplos: Redis, DynamoDB. Gran: Tópico 2." },
      { name: "Banco de Dados: NoSQL — colunar", description: "Dados armazenados por coluna em vez de por linha. Muito eficiente para consultas analíticas em grandes volumes de dados. Exemplos: Cassandra, HBase. Gran: Tópico 2." },
      { name: "Banco de Dados: MongoDB", description: "Banco NoSQL orientado a documentos mais popular. Documentos em formato BSON, organizados em coleções (equivalente a tabelas). Operações: find(), insert(), update(), operadores como $eq, $gt, $in. Gran: Tópico 2 + PDF 'Banco de Dados NoSQL'." },
      { name: "Banco de Dados: PostgreSQL", description: "SGBD relacional open-source avançado. Diferenciais em relação ao SQL padrão: suporte a JSON, tipos de dados adicionais, full-text search, extensões. Gran: Tópico 7." },
      { name: "Linguagens: Java SE 11 (OO, Collections, Streams, lambdas)", description: "Orientação a objetos: herança (extends), interfaces (implements), polimorfismo, classes abstratas. Collections (List, Map, Set), Streams, lambdas, try/catch/finally. CESGRANRIO cobrou 6 questões de Java em 2023 (Q38, Q48, Q63, Q64, Q65, Q70) — maior subtema isolado de TI. Gran: Tópico 12 + PDF 'Linguagem Java'." },
      { name: "Linguagens: Java EE 8 (servlets, JPA, JAX-RS)", description: "Java para aplicações enterprise. Servlets: ciclo de vida, doGet/doPost. JPA: mapeamento objeto-relacional, @Entity, @Id. JAX-RS: criação de REST APIs com @GET, @POST, @Path. CDI: injeção de dependência. Gran: Tópico 13." },
      { name: "Big Data: Fundamentos e os 5 Vs", description: "Volume, Velocidade, Variedade (os 3 Vs originais de Doug Laney) + Veracidade e Valor. Ecossistema Hadoop (HDFS, MapReduce), Apache Spark. CESGRANRIO perguntou os Vs em 2023 (Q43 — apenas os 3 originais na definição clássica). Gran: Tópico 4 + PDF 'Big Data, Hadoop e Spark' da Patrícia Quintão." },
      { name: "Big Data: Técnicas de preparação de dados", description: "Limpeza de dados (data cleaning), tratamento de valores nulos, normalização, padronização, codificação de variáveis categóricas, detecção e tratamento de outliers, integração de fontes heterogêneas. Gran: Tópico 5." },
      { name: "Big Data: Técnicas de apresentação de dados", description: "Visualização de dados, tipos de gráficos (histograma, scatter plot, heatmap), dashboards, storytelling com dados, ferramentas de BI. Gran: Tópico 6." },
      { name: "Python: fundamentos e sintaxe", description: "Tipos de dados, listas, dicionários, tuplas, loops (for, while), funções, compreensão de listas (list comprehension), manipulação de strings, escopo de variáveis. Base necessária para entender as bibliotecas de dados. Gran: Tópico 16 + PDF 'Linguagem Python' da Patrícia Quintão." },
      { name: "Python: Pandas (DataFrames, operações)", description: "DataFrames: criação, leitura de CSV/JSON, seleção de colunas e linhas, máscaras booleanas (df[mask]), filtros, groupby, merge, rename. CESGRANRIO cobrou seleção de colunas com máscara booleana (Q45) em 2023. Gran: Tópico 16 + PDF 'Bibliotecas do Python'." },
      { name: "Python: NumPy (arrays, álgebra linear)", description: "Arrays multidimensionais (ndarray), operações vetorizadas, reshape, transpose, dot product (produto matricial), sum, np.where (condicional vetorizado). CESGRANRIO cobrou dot/sum (Q51) e np.where (Q61) em 2023. Gran: Tópico 16 + PDF 'Bibliotecas do Python'." },
      { name: "Python: Matplotlib (gráficos, plots)", description: "Criação de gráficos: plt.plot() (linha), plt.bar() (barras), plt.scatter() (dispersão), subplots, configuração de títulos, legendas e eixos. Gran: Tópico 16 + PDF 'Bibliotecas do Python'." },
      { name: "Python: SciPy (estatísticas, otimização)", description: "Funções científicas avançadas: testes estatísticos, integração numérica, otimização de funções, álgebra linear (linalg), processamento de sinais. Menos cobrado que Pandas e NumPy, mas está no edital. Gran: Tópico 16 + PDF 'Bibliotecas do Python'." },

let state = {}; // { "ti:0": {status: "0", note: ""}, ... }

let statusFilter = "all";

let authReady = false;
let remoteEnabled = false;

function getLocalStateValue(keyName) {
  try {
    return window.localStorage.getItem(keyName);
  } catch (error) {
    return null;
  }
}

function setLocalStateValue(keyName, value) {
  try {
    window.localStorage.setItem(keyName, value);
  } catch (error) {
    // Sem armazenamento local disponível; o Firestore segue como fonte principal.
  }
}

function hasStoredProgress(rawValue) {
  if (!rawValue) return false;
  try {
    const parsed = JSON.parse(rawValue);
    return Boolean(parsed && Object.keys(parsed).length);
  } catch (error) {
    return false;
  }
}

const storageAdapter = {
  async get(keyName) {
    const localValue = getLocalStateValue(keyName);

    if (remoteEnabled && currentUser) {
      const snapshot = await getDoc(doc(db, "studyProgress", currentUser.uid));
      if (snapshot.exists()) {
        const data = snapshot.data();
        const remoteValue = JSON.stringify(data.state || {});
        setLocalStateValue(keyName, remoteValue);
        return { value: remoteValue, source: "remote" };
      }

      if (hasStoredProgress(localValue)) {
        await setDoc(doc(db, "studyProgress", currentUser.uid), {
          state: JSON.parse(localValue),
          updatedAt: new Date().toISOString(),
          email: currentUser.email || null
        }, { merge: true });
        return { value: localValue, source: "local-migrated" };
      }
    }

    return { value: localValue, source: "local" };
  },
  async set(keyName, value) {
    setLocalStateValue(keyName, value);

    if (remoteEnabled && currentUser) {
      await setDoc(doc(db, "studyProgress", currentUser.uid), {
        state: JSON.parse(value),
        updatedAt: new Date().toISOString(),
        email: currentUser.email || null
      }, { merge: true });
    }

    return true;
  }
};

function updateSaveIndicator(message, isSaved = false) {
  const ind = document.getElementById("save-ind");
  if (!ind) return;
  ind.className = isSaved ? "save-indicator saved" : "save-indicator";
  ind.querySelector("span").textContent = message;
}

function describeAuthError(error) {
  if (!error || !error.code) return "erro-desconhecido";
  if (error.code === "auth/operation-not-allowed") return "email-senha-nao-habilitado";
  if (error.code === "auth/invalid-credential") return "email-ou-senha-invalidos";
  if (error.code === "auth/invalid-email") return "email-invalido";
  if (error.code === "auth/missing-password") return "senha-obrigatoria";
  if (error.code === "auth/weak-password") return "senha-fraca";
  if (error.code === "auth/email-already-in-use") return "email-ja-cadastrado";
  if (error.code === "permission-denied") return "firestore-sem-permissao";
  return error.code;
}

function renderAuthBar() {
  let authBar = document.getElementById("auth-bar");
  if (!authBar) {
    const appShell = document.querySelector(".app-shell");
    const statsGrid = document.getElementById("stats-grid");
    authBar = document.createElement("div");
    authBar.id = "auth-bar";
    authBar.className = "disc-header";
    appShell.insertBefore(authBar, statsGrid);
  }

  if (!authReady) {
    authBar.innerHTML = '<div class="disc-title">Conectando ao Firebase...</div>';
    return;
  }

  if (currentUser) {
    authBar.innerHTML = `
      <div class="disc-title">Sincronização ativa</div>
      <div class="disc-meta">${currentUser.email || "Usuário autenticado"}</div>
      <button class="filter-btn active" id="logout-btn">Sair</button>
    `;
    document.getElementById("logout-btn").onclick = async () => {
      await signOut(auth);
    };
    return;
  }

  authBar.innerHTML = `
    <div>
      <div class="disc-title">Login pessoal</div>
      <div class="disc-meta">Use email e senha para salvar na nuvem</div>
    </div>
    <div class="auth-form">
      <input class="auth-input" id="email-input" type="email" placeholder="Seu email" />
      <input class="auth-input" id="password-input" type="password" placeholder="Sua senha" />
      <button class="filter-btn active" id="login-btn">Entrar</button>
      <button class="filter-btn" id="register-btn">Criar acesso</button>
    </div>
  `;

  const getCredentials = () => ({
    email: document.getElementById("email-input").value.trim(),
    password: document.getElementById("password-input").value
  });

  document.getElementById("login-btn").onclick = async () => {
    try {
      const { email, password } = getCredentials();
      await signInWithEmailAndPassword(auth, email, password);
      updateSaveIndicator("Login realizado com sucesso", true);
    } catch (error) {
      updateSaveIndicator(`Falha no login: ${describeAuthError(error)}`);
    }
  };

  document.getElementById("register-btn").onclick = async () => {
    try {
      const { email, password } = getCredentials();
      await createUserWithEmailAndPassword(auth, email, password);
      updateSaveIndicator("Acesso criado com sucesso", true);
    } catch (error) {
      updateSaveIndicator(`Falha ao criar acesso: ${describeAuthError(error)}`);
    }
  };
}

function key(discId, topicIdx) { return `${discId}:${topicIdx}`; }

function getState(discId, idx) {
  return state[key(discId, idx)] || { status: "0", note: "" };
}

function setState(discId, idx, field, val) {
  const k = key(discId, idx);
  if (!state[k]) state[k] = { status: "0", note: "" };
  state[k][field] = val;
  scheduleSave();
  renderStats();
  renderTabs();
  renderContent();
  renderDiscHeader(discId);
}

async function loadState() {
  try {
    const r = await storageAdapter.get(STORAGE_KEY);
    state = r && r.value ? JSON.parse(r.value) : {};
  } catch(e) {
    state = {};
    updateSaveIndicator(`Falha ao carregar dados: ${describeAuthError(e)}`);
  }
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  updateSaveIndicator(remoteEnabled && currentUser ? "Sincronizando..." : "Salvando localmente...");
  saveTimeout = setTimeout(async () => {
    try {
      await storageAdapter.set(STORAGE_KEY, JSON.stringify(state));
      updateSaveIndicator(remoteEnabled && currentUser ? "Dados sincronizados ✓" : "Dados salvos localmente ✓", true);
    } catch(e) {
      updateSaveIndicator("Erro ao salvar");
    }
  }, 800);
}

function countByStatus(discId) {
  const disc = DISCIPLINES.find(d => d.id === discId);
  const counts = { "0":0, "1":0, "2":0, "3":0, "4":0 };
  disc.topics.forEach((_, i) => {
    const s = getState(discId, i).status;
    counts[s] = (counts[s] || 0) + 1;
  });
  return counts;
}

function renderStats() {
  const totalTopics = DISCIPLINES.reduce((s, d) => s + d.topics.length, 0);
  let studied = 0, reviewing = 0, inProgress = 0, revised = 0;
  DISCIPLINES.forEach(d => {
    d.topics.forEach((_, i) => {
      const s = getState(d.id, i).status;
      if (s === "2") studied++;
      if (s === "3") reviewing++;
      if (s === "1") inProgress++;
      if (s === "4") revised++;
    });
  });
  const done = studied + revised;
  const pct = Math.round((done / totalTopics) * 100);

  document.getElementById("stats-grid").innerHTML = `
    <div class="stat-card">
      <div class="stat-num" style="color:var(--accent)">${totalTopics}</div>
      <div class="stat-label">Total de tópicos</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--status-1-t)">${inProgress}</div>
      <div class="stat-label">Em andamento</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--status-2-t)">${studied}</div>
      <div class="stat-label">Estudados</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--status-3-t)">${reviewing}</div>
      <div class="stat-label">Para revisar</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--status-4-t)">${revised}</div>
      <div class="stat-label">Revisados</div>
    </div>
  `;
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";
}

function renderDiscHeader(discId) {
  const el = document.getElementById("disc-header-" + discId);
  if (!el) return;
  const disc = DISCIPLINES.find(d => d.id === discId);
  const counts = countByStatus(discId);
  const done = (counts["2"] || 0) + (counts["4"] || 0);
  const pct = Math.round((done / disc.topics.length) * 100);
  const fillEl = el.querySelector(".disc-progress-fill");
  const metaEl = el.querySelector(".disc-meta");
  if (fillEl) fillEl.style.width = pct + "%";
  if (metaEl) metaEl.textContent = `${done}/${disc.topics.length} tópicos · ${disc.questions}q · ${disc.points}pts`;
}

function renderTabs() {
  const tabLabels = {
    portugues: "Português",
    ingles: "Inglês"
  };

  document.getElementById("tabs").innerHTML = DISCIPLINES.map(d => {
    const counts = countByStatus(d.id);
    const done = (counts["2"] || 0) + (counts["4"] || 0);
    return `<button class="tab ${d.id === activeTab ? 'active' : ''}" onclick="setTab('${d.id}')">
      <span style="width:8px;height:8px;border-radius:50%;background:${d.color};display:inline-block"></span>
      ${tabLabels[d.id] || d.name.split(' ')[0] + (d.name.split(' ').length > 2 ? '...' : '')}
      <span class="badge">${done}/${d.topics.length}</span>
    </button>`;
  }).join("");
}

function setTab(id) {
  activeTab = id;
  renderTabs();
  renderContent();
}

function setStatusFilter(sf, btn) {
  statusFilter = sf;
  document.querySelectorAll(".filter-row .filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderContent();
}

function renderContent() {

  let filteredTopics = disc.topics.map((t, i) => ({ t, i }));

    filteredTopics = filteredTopics.filter(({ i }) => getState(disc.id, i).status === statusFilter);

  const rows = filteredTopics.map(({ t, i }) => {

        ? `<div>${t.name}</div><div style="font-size:11px;color:var(--text-muted);margin-top:3px;line-height:1.5">${t.description}</div>`

    <div class="disc-header" id="disc-header-${disc.id}">
      <div class="disc-dot" style="background:${disc.color}"></div>
      <div class="disc-title">${disc.name}</div>
      <div class="disc-progress"><div class="disc-progress-fill" style="background:${disc.color};width:${pct}%"></div></div>
      <span class="priority-tag" style="background:${disc.pBg};color:${disc.pColor}">${disc.priority}</span>
      <div class="disc-meta">${done}/${disc.topics.length} tópicos · ${disc.questions}q · ${disc.points}pts</div>
    </div>
    ${filteredTopics.length === 0 
      ? '<div class="empty">Nenhum tópico com esse status nessa disciplina.</div>'
      : `<div class="table-wrap"><table class="topics-table">
          <thead><tr>
            <th>#</th>
            <th>Tópico</th>
            <th>Status</th>
            <th>Anotações</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`
    }
  `;
}

async function init() {
  try {
    await setPersistence(auth, browserLocalPersistence);
  } catch (error) {
    updateSaveIndicator(`Persistência de login indisponível: ${describeAuthError(error)}`);
  }
  renderAuthBar();
  await loadState();
  renderStats();
  renderTabs();
  renderContent();
}

onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  authReady = true;
  remoteEnabled = Boolean(user);
  renderAuthBar();
  await loadState();
  renderStats();
  renderTabs();
  renderContent();
  updateSaveIndicator(remoteEnabled && currentUser ? "Dados sincronizados com Firebase" : "Modo local ativo");
});

Object.assign(window, {
  setTab,
  setStatusFilter,
  setState,
  STATUS_CONFIG
});

init();
</script>
</body>
</html>
