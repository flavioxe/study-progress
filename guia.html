## 2. PLANO DE ESTUDOS — 6 MESES

### Princípios do plano
- TI é inegociável: sempre na pauta, todo dia
- Introduzir uma nova matéria por vez para não sobrecarregar
- Cada nova matéria entra enquanto a anterior continua em revisão
- Semana não tem horário rígido, mas tem uma **ordem sugerida de assuntos**
- Revisão com Anki **todo dia à noite** (15–30 min)

---

### 🗓️ FASE 1 — Diagnóstico + Setup (Semanas 1–2)

**Objetivo:** Saber onde você está antes de começar.

**Semana 1:**
- Segunda: Baixe uma prova antiga de CESGRANRIO BB (sugestão: BB 2021 Agente de Tecnologia ou similar). Faça do início ao fim sem estudar nada antes.
- Anote quantas acertou em cada disciplina. Esse é seu **baseline**.
- Terça a Sexta: Assista as primeiras aulas de TI no Gran Cursos. Foco em **Estrutura de Dados e Algoritmos** (começa pelo mais concreto e visual). Assista no ritmo normal, pausa quando não entender.
- Instale o **Anki** e comece a criar os primeiros cards.

**Semana 2:**
- Continue TI (Estrutura de Dados)
- Comece a configurar o TecConcursos com filtro de banca: CESGRANRIO
- Crie uma pasta de erros: sempre que errar uma questão, anote o tema e o motivo do erro

**Modelo de semana Fase 1:**
| Dia | Manhã | Noite |
|---|---|---|
| Seg | TI: vídeo aula + resumo (2h) | Anki (20 min) |
| Ter | TI: vídeo aula + questões (3h) | Anki (20 min) |
| Qua | TI: questões TecConcursos CESGRANRIO (2h) + revisão erros (1h) | Anki (20 min) |
| Qui | TI: novo subtema + anotações (3h) | Anki (20 min) |

## 3. TÉCNICAS DE ESTUDO E REVISÃO

### A sequência ideal para estudar uma matéria nova

1. **Vídeo aula** — Absorção passiva. Assista sem pausas para tomar notas longas. Só pause quando não entender absolutamente nada.
2. **PDF/material escrito** — Leia ativamente. Grife o essencial. Escreva com suas próprias palavras o que você entendeu.
3. **Questões CESGRANRIO** — Resolva de 10 a 20 questões logo após estudar o tema. Errou? Anote o motivo específico do erro.
4. **Anki** — Crie os cards com o conteúdo ainda fresco. Não deixe para depois.

---

### Como usar o Anki corretamente

O Anki usa repetição espaçada: te mostra um card com mais frequência quando você erra e com menos frequência quando você acerta. Isso maximiza a retenção com menos tempo.

**Boas práticas:**
- Frente do card: uma pergunta curta e específica. Ex: *"Qual é a complexidade do Bubble Sort no pior caso?"*
- Verso do card: resposta direta. Ex: *"O(n²)"*
- Não crie cards com blocos de texto. Um card = um conceito.
- Revise todos os dias (15–30 min à noite). Pular um dia cria acúmulo.
- Use imagens quando o conceito for visual (ex: diagrama ER, estrutura de lista encadeada).
- Baralhos sugeridos: um por disciplina.

**Quando criar os cards:** no mesmo dia que estudou o conteúdo, nunca depois de uma semana.

---

### Ciclo de revisão por tema

| Momento | O que fazer |
|---|---|
| Mesmo dia | Releia o resumo por 10–15 minutos antes de dormir |
| 1 semana depois | Resolva 10–15 questões do tema sem consultar material |
| 1 mês depois | Revisão com Anki + 10 questões |
| 3 meses depois | Simulado que inclua o tema |

---

### Como usar as questões de forma inteligente

- **Sempre filtre por banca CESGRANRIO** no TecConcursos. Cada banca tem linguagem e pegadinhas diferentes.
- Não resolva questões no modo "treino contínuo". Resolva por tema específico primeiro, depois mescle.
- A pasta de erros é sagrada: sempre anote o tema, a sua resposta, a resposta certa e o motivo do erro. Categorias comuns de erro: falta de conhecimento, confusão entre conceitos parecidos, leitura errada do enunciado.
- Quando terminar um subtema, faça um mini-simulado de 10–15 questões só daquele subtema.

---

### Como medir sua evolução (baseline e revisitas)

1. Antes de começar: faça uma prova CESGRANRIO BB completa sem estudar. Anote o % por disciplina.
2. A cada 4–6 semanas: refaça uma prova (pode ser diferente) e compare com o baseline.
3. Meta razoável: estar acima de 60–65% de acerto por disciplina antes de entrar em fase de simulados.
4. TI: mínimo de 55–60% de acerto (são 35 questões, precisar acertar ao menos 18–20 para sobrar margem no restante).

---

### Plataformas e como usar cada uma

| Plataforma | Uso ideal |
|---|---|
| **Gran Cursos Online** | Vídeo aulas completas + PDFs + questões comentadas. Base principal de conteúdo. |
| **TecConcursos** | Questões de provas anteriores filtradas por banca (CESGRANRIO). Prioridade máxima para questões. |
| **Anki** | Revisão espaçada diária. Instale o app no celular para revisar em qualquer momento. |
| **William Capriata (YouTube)** | Conhecimentos bancários (gratuito, excelente para o BB especificamente). |
| **Renan Duarte (YouTube)** | Bancários + Atualidades + Vendas. Gratuito. |
| **BizuMatemática — Júlio César (YouTube)** | Matemática básica e financeira. Gratuito, didático. |
| **Direção Concursos (YouTube)** | Informática e Inglês. Gratuito. |
| **Álvaro Ferreira (YouTube)** | Português para concursos. Gratuito. |
| **Glau (glau.com.br)** | Correção gratuita de redação. Use 1x por semana a partir do mês 4. |
| **ThinkU** | Simulados completos. Use para simular condição real de prova. |`;

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function inlineMarkdown(text) {
      return text
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>');
    }

    function parseTable(lines, start) {
      const tableLines = [];
      let index = start;
      while (index < lines.length && /^\|.*\|$/.test(lines[index].trim())) {
        tableLines.push(lines[index].trim());
        index += 1;
      }

      if (tableLines.length < 2) {
        return null;
      }

      const rows = tableLines
        .filter((line, idx) => !(idx === 1 && /^\|?\s*[-:| ]+\|\s*$/.test(line)))
        .map((line) => line.slice(1, -1).split('|').map((cell) => inlineMarkdown(escapeHtml(cell.trim()))));

      const header = rows.shift() || [];
      const thead = `<thead><tr>${header.map((cell) => `<th>${cell}</th>`).join('')}</tr></thead>`;
      const tbody = `<tbody>${rows.map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody>`;
      return { html: `<table>${thead}${tbody}</table>`, nextIndex: index };
    }

    function markdownToHtml(source) {
      const lines = source.replace(/\r/g, '').split('\n');
      const html = [];
      let listType = null;

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i].trim();

        if (!line) {
          if (listType) {
            html.push(listType === 'ol' ? '</ol>' : '</ul>');
            listType = null;
          }
          continue;
        }

        const table = parseTable(lines, i);
        if (table) {
          if (listType) {
            html.push(listType === 'ol' ? '</ol>' : '</ul>');
            listType = null;
          }
          html.push(table.html);
          i = table.nextIndex - 1;
          continue;
        }

        if (line === '---') {
          if (listType) {
            html.push(listType === 'ol' ? '</ol>' : '</ul>');
            listType = null;
          }
          html.push('<hr>');
          continue;
        }

        if (line.startsWith('### ')) {
          if (listType) {
            html.push(listType === 'ol' ? '</ol>' : '</ul>');
            listType = null;
          }
          html.push(`<h3>${inlineMarkdown(escapeHtml(line.slice(4)))}</h3>`);
          continue;
        }

        if (line.startsWith('## ')) {
          if (listType) {
            html.push(listType === 'ol' ? '</ol>' : '</ul>');
            listType = null;
          }
          html.push(`<h2>${inlineMarkdown(escapeHtml(line.slice(3)))}</h2>`);
          continue;
        }

        if (line.startsWith('# ')) {
          if (listType) {
            html.push(listType === 'ol' ? '</ol>' : '</ul>');
            listType = null;
          }
          html.push(`<h1>${inlineMarkdown(escapeHtml(line.slice(2)))}</h1>`);
          continue;
        }

        if (line.startsWith('> ')) {
          if (listType) {
            html.push(listType === 'ol' ? '</ol>' : '</ul>');
            listType = null;
          }
          html.push(`<blockquote>${inlineMarkdown(escapeHtml(line.slice(2)))}</blockquote>`);
          continue;
        }

        if (/^\d+\. /.test(line)) {
          if (listType !== 'ol') {
            if (listType) html.push('</ul>');
            html.push('<ol>');
            listType = 'ol';
          }
          html.push(`<li>${inlineMarkdown(escapeHtml(line.replace(/^\d+\. /, '')))}</li>`);
          continue;
        }

        if (/^[-*] /.test(line)) {
          if (listType !== 'ul') {
            if (listType) html.push('</ol>');
            html.push('<ul>');
            listType = 'ul';
          }
          html.push(`<li>${inlineMarkdown(escapeHtml(line.replace(/^[-*] /, '')))}</li>`);
          continue;
        }

        if (listType) {
          html.push(listType === 'ol' ? '</ol>' : '</ul>');
          listType = null;
        }

        html.push(`<p>${inlineMarkdown(escapeHtml(line))}</p>`);
      }

      if (listType) {
        html.push(listType === 'ol' ? '</ol>' : '</ul>');
      }

      return html.join('');
    }

    document.getElementById('content').innerHTML = markdownToHtml(markdown);
  </script>
